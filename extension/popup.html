<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="header">
    <div class="brand"><span>Job</span><span class="brand-accent">Signal</span></div>
    <button id="btnSettings" class="icon-btn" title="Settings">⚙️</button>
  </div>
  
  <div id="settingsPanel" class="hidden">
    <p class="muted small" style="margin-bottom:8px;">
      Before a demo or production use, set this to your deployed API origin (for example your Railway URL). Local development defaults are not shipped to users.
    </p>
    <label>Backend URL (API origin, no trailing path):</label>
    <input type="text" id="backendUrlInput" placeholder="https://your-app.up.railway.app" />
    <button id="btnClearCache" class="ghost-btn">Clear Session Cache</button>
    <button id="btnSaveSettings" class="btn-primary">Save</button>
  </div>

  <div id="mainContent">
    <div id="stateIdle" class="state-panel hidden">
      <div id="jobPreview" class="job-preview hidden">
        <h3 id="previewTitle"></h3>
        <p id="previewCompany"></p>
      </div>
      <button id="btnVerify" class="btn-primary">Verify this job posting</button>
    </div>

    <div id="stateLoading" class="state-panel hidden">
      <div class="skeleton-row w-40"></div>
      <div class="skeleton-row w-90"></div>
      <div class="skeleton-row w-75"></div>
      <p id="loadingText" class="muted">Checking job...</p>
    </div>

    <div id="stateResult" class="state-panel hidden">
      <div class="verdict-band" id="verdictBand">
        <div class="verdict-chip" id="verdictChip">
          <span class="chip-icon" id="verdictIcon"></span>
          <span class="chip-label" id="verdictLabel"></span>
        </div>
        <div class="confidence-block">
          <div class="confidence-line">
            <span>Confidence</span>
            <strong id="confidencePct"></strong>
          </div>
          <div class="confidence-track">
            <div class="confidence-fill" id="confidenceFill"></div>
          </div>
        </div>
      </div>
      
      <h4 class="section-title">Trust Signals</h4>
      <ul id="signalList" class="signal-checklist"></ul>
      
      <button id="btnSeeFull" class="ghost-btn mt-2">See full report</button>
    </div>

    <div id="stateError" class="state-panel hidden">
      <p id="errorText" class="error-text"></p>
      <button id="btnOpenApp" class="ghost-btn">Open in app</button>
    </div>

    <div id="stateNotJob" class="state-panel hidden">
      <p class="muted">This doesn't look like a job posting.</p>
      <button id="btnOpenAppFallback" class="ghost-btn">Open JobSignal</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
